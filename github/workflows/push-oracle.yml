# .github/workflows/push-oracle.yml
# ─────────────────────────────────────────────────────────────────────────────
# NeuralMint Oracle Auto-Pusher — GitHub Actions Cron
#
# WHY THIS REPLACES VERCEL CRON + GELATO:
#   • Vercel hobby plan: crons limited to once per DAY (not 4 hours)
#   • Gelato: unreliable for custom serverless callers, complex setup
#   • GitHub Actions: 100% free on public repos, runs on schedule,
#     supports every-4-hours cron natively, no external service needed.
#
# HOW IT WORKS:
#   Every 4 hours, GitHub Actions sends an authenticated GET request to
#   your Vercel /api/push endpoint. That endpoint fetches the BTC signal
#   and pushes it to your smart contract on Polygon.
#
# SETUP:
#   1. In your GitHub repo → Settings → Secrets and variables → Actions
#   2. Add these repository secrets:
#      PRODUCTION_URL  → https://your-app.vercel.app  (no trailing slash)
#      CRON_SECRET     → same value as your Vercel CRON_SECRET env var
#
# That's it. No Gelato account, no Vercel Pro plan needed.
# ─────────────────────────────────────────────────────────────────────────────

name: NeuralMint Oracle Push

on:
  schedule:
    # Run at minute 0 of every 4th hour: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: "0 */4 * * *"

  # Allow manual trigger from GitHub Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  push-oracle:
    name: Push BTC Signal On-Chain
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Push Oracle Signal
        run: |
          echo "Triggering oracle push at $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/push")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

          # Exit with error if HTTP status is not 2xx
          if [[ "$HTTP_CODE" -lt 200 || "$HTTP_CODE" -ge 300 ]]; then
            echo "Push failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # Check if the response indicates an error (even on HTTP 200)
          STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unknown'))" 2>/dev/null)
          echo "Oracle status: $STATUS"

          if [[ "$STATUS" == "error" ]]; then
            echo "Oracle push returned error status"
            exit 1
          fi

          echo "Done. Status: $STATUS"
